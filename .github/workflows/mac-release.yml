name: Mac Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag matching the GitHub release (e.g. v0.3.0)'
        required: true

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Set up SSH agent for Bitbucket
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.BITBUCKET_SSH_KEY }}

      - name: Trust Bitbucket host key
        run: ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts

      - name: Clone from Bitbucket
        run: git clone git@bitbucket.org:rappax/feather-lens.git .

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Rust (stable, universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build MCP bundle (macOS native)
        run: cd mcp && npm ci && npm run bundle

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign better_sqlite3.node with Developer ID
        run: |
          codesign --force --verify --verbose \
            --sign "Developer ID Application: Scott Turnbull (V9MB7JL7JZ)" \
            --timestamp \
            --options runtime \
            mcp/bundle/build/Release/better_sqlite3.node

      - name: Write Apple API key for notarization
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_CONTENT" > ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Build Tauri app (universal macOS binary)
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Scott Turnbull (V9MB7JL7JZ)"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Makes `tauri build` also emit the updater artifact (.app.tar.gz + .sig),
          # signed with the same key release.sh uses for the Windows EXE.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Find built DMG and updater artifact
        id: find_dmg
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          TARGZ=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app.tar.gz" | head -1)
          echo "path=$DMG" >> $GITHUB_OUTPUT
          echo "targz=$TARGZ" >> $GITHUB_OUTPUT
          echo "targz_sig=${TARGZ}.sig" >> $GITHUB_OUTPUT
          echo "Found DMG: $DMG"
          echo "Found updater artifact: $TARGZ"

      - name: Upload DMG and updater artifact to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.version }} \
            "${{ steps.find_dmg.outputs.path }}" \
            "${{ steps.find_dmg.outputs.targz }}" \
            --repo Scottnine/filamental \
            --clobber

      - name: Update Cloudflare Worker (mac updater entry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TARGZ_NAME=$(basename "${{ steps.find_dmg.outputs.targz }}")
          TARGZ_URL="https://github.com/Scottnine/filamental/releases/download/${{ inputs.version }}/${TARGZ_NAME}"
          SIG=$(cat "${{ steps.find_dmg.outputs.targz_sig }}")
          VERSION_MAC="${{ inputs.version }}"
          VERSION_MAC="${VERSION_MAC#v}"
          PUB_DATE_MAC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # VERSION_MAC gates the update check for darwin targets — this is what
          # stops a Windows-only release.sh bump from making Mac clients think
          # there's an update when this platform's build hasn't actually moved.
          PATCHES=$(node -e "console.log(JSON.stringify({SIGNATURE_MAC: process.argv[1], APP_TARGZ_URL: process.argv[2], VERSION_MAC: process.argv[3], PUB_DATE_MAC: process.argv[4]}))" "$SIG" "$TARGZ_URL" "$VERSION_MAC" "$PUB_DATE_MAC")
          PATCHES="$PATCHES" node scripts/patch-worker-platform.js
          cd cloudflare
          npx --yes wrangler@latest deploy

      - name: Sync deployed worker.js back to Bitbucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloudflare/worker.js
          if git diff --cached --quiet; then
            echo "No worker.js changes to sync."
          else
            git commit -m "chore(worker): sync mac updater entry for ${{ inputs.version }}"
            # Mac/Linux workflows can run concurrently and both touch this
            # file — retry with rebase on a non-fast-forward push.
            for i in 1 2 3 4 5; do
              git push origin HEAD:main && break
              echo "Push rejected, rebasing onto latest main (attempt $i)..."
              git fetch origin main
              git rebase origin/main
              sleep 5
            done
          fi
