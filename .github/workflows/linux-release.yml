name: Linux Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag matching the GitHub release (e.g. v0.3.7)'
        required: true

# Shared with mac-release.yml so the two never deploy to Cloudflare at the
# same time. Each workflow patches its own platform's fields onto a local
# git-clone snapshot of cloudflare/worker.js taken at job start and deploys
# independently — if both ran concurrently, whichever deploys last wins with
# a stale snapshot of the other's just-published fields, silently reverting
# it (hit for real on the v0.3.13 release: Linux's deploy clobbered Mac's
# fresh entry back to the previous version). Serializing the whole job is
# the simplest way to close that window completely.
concurrency:
  group: filamental-release-cloudflare-worker
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Set up SSH agent for Bitbucket
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.BITBUCKET_SSH_KEY }}

      - name: Trust Bitbucket host key
        run: ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts

      - name: Clone from Bitbucket
        run: git clone git@bitbucket.org:rappax/feather-lens.git .

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libfuse2 \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build MCP bundle (Linux native)
        run: cd mcp && npm ci && npm run bundle

      - name: Clean stale bundle output
        # actions/cache's restore-keys prefix fallback can restore a target/
        # dir from an older release when Cargo.lock's hash doesn't exactly
        # match the cache key, leaving a stale-versioned .rpm/.deb/.AppImage
        # sitting in the bundle dir alongside the freshly-built one — "Find
        # built packages" below has no way to prefer the new one. Wipe the
        # bundle dir before every build so only this run's output can exist.
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri app (deb + rpm + AppImage)
        env:
          # Makes `tauri build` also emit the AppImage's updater signature
          # (.AppImage.sig), signed with the same key release.sh uses for
          # the Windows EXE. deb/rpm are package-manager-installed and have
          # no updater artifact — only AppImage supports in-app auto-update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build

      - name: Find built packages
        id: find_packages
        run: |
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          RPM=$(find src-tauri/target/release/bundle/rpm -name "*.rpm" | head -1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          echo "deb=$DEB" >> $GITHUB_OUTPUT
          echo "rpm=$RPM" >> $GITHUB_OUTPUT
          echo "appimage=$APPIMAGE" >> $GITHUB_OUTPUT
          echo "appimage_sig=${APPIMAGE}.sig" >> $GITHUB_OUTPUT
          echo "Found: $DEB / $RPM / $APPIMAGE"

      - name: Upload packages to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.version }} \
            "${{ steps.find_packages.outputs.deb }}" \
            "${{ steps.find_packages.outputs.rpm }}" \
            "${{ steps.find_packages.outputs.appimage }}" \
            --repo Scottnine/filamental \
            --clobber

      - name: Update Cloudflare Worker (linux download links + updater entry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BASE="https://github.com/Scottnine/filamental/releases/download/${{ inputs.version }}"
          DEB_URL="${BASE}/$(basename "${{ steps.find_packages.outputs.deb }}")"
          RPM_URL="${BASE}/$(basename "${{ steps.find_packages.outputs.rpm }}")"
          APPIMAGE_URL="${BASE}/$(basename "${{ steps.find_packages.outputs.appimage }}")"
          SIG=$(cat "${{ steps.find_packages.outputs.appimage_sig }}")
          VERSION_LINUX="${{ inputs.version }}"
          VERSION_LINUX="${VERSION_LINUX#v}"
          PUB_DATE_LINUX=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # VERSION_LINUX gates the update check for linux-x86_64 — this is what
          # stops a Windows-only release.sh bump from making Linux clients think
          # there's an update when this platform's build hasn't actually moved.
          PATCHES=$(node -e "console.log(JSON.stringify({DOWNLOAD_DEB: process.argv[1], DOWNLOAD_RPM: process.argv[2], DOWNLOAD_APPIMAGE: process.argv[3], SIGNATURE_LINUX: process.argv[4], VERSION_LINUX: process.argv[5], PUB_DATE_LINUX: process.argv[6]}))" "$DEB_URL" "$RPM_URL" "$APPIMAGE_URL" "$SIG" "$VERSION_LINUX" "$PUB_DATE_LINUX")
          PATCHES="$PATCHES" node scripts/patch-worker-platform.js
          # Persisted for the sync-back step below, so a push retry can
          # re-derive the exact same patch on top of a freshly-fetched main
          # instead of needing a rebase.
          echo "PATCHES<<WORKER_PATCHES_EOF" >> "$GITHUB_ENV"
          echo "$PATCHES" >> "$GITHUB_ENV"
          echo "WORKER_PATCHES_EOF" >> "$GITHUB_ENV"
          cd cloudflare
          npx --yes wrangler@latest deploy

      - name: Sync deployed worker.js back to Bitbucket
        env:
          # Repo-level SSH access keys on Bitbucket Cloud are read-only by
          # design (no write-access toggle exists) — pushes use an account
          # API token over HTTPS instead. Reads (clone/fetch) still use the
          # SSH key above, which works fine for that.
          BITBUCKET_PUSH_URL: https://x-bitbucket-api-token-auth:${{ secrets.BITBUCKET_API_TOKEN }}@bitbucket.org/rappax/feather-lens.git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloudflare/worker.js
          if git diff --cached --quiet; then
            echo "No worker.js changes to sync."
          else
            git commit -m "chore(worker): sync linux updater entry for ${{ inputs.version }}"
            # Defensive retry — mac-release.yml and linux-release.yml now
            # share a concurrency group so they no longer deploy at the same
            # time, but this still guards against any other writer (e.g. a
            # manual push) landing in the gap between our clone and this
            # push. Deliberately NOT `git rebase`: the build leaves other
            # tracked files dirty (Cargo.lock, mcp bundle output), and
            # rebase refuses to run against anything but a fully clean
            # working tree. Hard-reset to the new main and re-apply the same
            # deterministic patch instead — no clean-tree requirement.
            for i in 1 2 3 4 5; do
              git push "$BITBUCKET_PUSH_URL" HEAD:main && break
              echo "Push rejected (attempt $i) — resetting to latest main and re-applying this platform's patch..."
              git fetch origin main
              git reset --hard origin/main
              PATCHES="$PATCHES" node scripts/patch-worker-platform.js
              git add cloudflare/worker.js
              git commit -m "chore(worker): sync linux updater entry for ${{ inputs.version }}"
              sleep 5
            done
          fi
